<html>
    <head>
        <title>Form Elements 2</title>
    </head>
    <body>
        <section>
            <div>
                <form>
                    <label for="skill">Select your Skill</label>
                    <select required id="skill">
                        <option value="" selected disabled>Choose One..</option>
                        <option value="html">HTML</option>
                        <option value="css">CSS</option>
                        <option value="react">REACT</option>
                        <option value="node">NODE</option>
                    </select>
                </form>
            </div>
        </section>


        <section>
            <div>
                <label>Select One..</label>
                <select required>

                    <option value="" selected disabled>Selct On.</option>
                    <optgroup label="Frontend">
                          <option value="html">HTML</option>
                          <option value="css">CSS</option>
                          <option value="bs">BS</option>
                    </optgroup>

                       <optgroup label="Backend">
                          <option value="es">Express</option>
                          <option value="re">React</option>
                          <option value="no">Node</option>
                    </optgroup>
                </select>
            </div>
        </section>



        <section>
            <div>
                <fieldset>
                    <legend>Address</legend>
                    <label for="">Enter the Address</label>
                    <textarea></textarea>
                    <label for="">Enter the Name</label>
                    <input type="text" >
                </fieldset>
            </div>
        </section>
    </body>
</html>
