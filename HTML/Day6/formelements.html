<html>
    <head>
        <title>Form Elements</title>
    </head>
    <body>
        <section>
            <div>
               <center>
                   <form  method="post">
                    <label>Enter the Name</label>
                    <br/>
                    <input type="text" required  placeholder="Enter the Name" />
                    <br/>
                    <label>Enter the Age</label>
                    <br/>
                    <input type="number"  min="18" max ="45" required placeholder="Above 18 Only" />
                    <br/>
                    <label>Enter the Mobile No</label>
                    <br/>
                    <input type="tel" minlength="10" maxlength="10" required placeholder="10 Digi Number" />
                    <br/>
                    <label>Gender</label>
                    <br/>
                    <input type="radio" required name="gender"> Male
                    <input type="radio" required name="gender"> FeMale
<br/>
                    <label>Skills</label>
                    <br/>
                    <input type="checkbox"  name="skills" />HTML
                    <input type="checkbox" name="skills" />CSS
                    <input type="checkbox" name="skills" />Js
                <br/>
                    <input type="submit" value="Register">
 <select required id="skill">
                        <option value="" selected disabled>Choose One..</option>
                        <option value="html">HTML</option>
                        <option value="css">CSS</option>
                        <option value="react">REACT</option>
                        <option value="node">NODE</option>
                    </select>
                    <textarea  rows="3"></textarea>
                </form>
               </center>
            </div>
        </section>
    </body>
</html>
