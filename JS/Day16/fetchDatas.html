    <table>
        <thead>
            <th>S.no</th>

            <th>Category</th>
        </thead>

        <tbody id="usersData">

        </tbody>

    <script>

    //  async function
    
    const Datatake = async()=>{

    // using await in fetch function
    
    const datas = await fetch("https://dummyjson.com/users")

    

    // data parsing

    const res = await datas.json()


    // Data store from the anotgher mechine
    
    const result = res.users

    // Take UI form the html - docu
    
     let users_Data = document.getElementById("usersData")

    // result foreach - innerHTML
     
    result.forEach((e,i)=>{
        users_Data.innerHTML += `
               
                    <tr>
              <td>${i+1}</td>
              
              <td>${e.firstName}</td> 
              <td>${e.gender}</td> 
              <td>${e.phone}</td> 
                 
            </tr>  

        
        `
    })
    
    



    }

// Function Call
    Datatake()
