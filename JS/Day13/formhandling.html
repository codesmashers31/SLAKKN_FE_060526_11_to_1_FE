<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form id="datas" onsubmit="handleChage(event)" method="post">
        <input type="text" placeholder="Enter the Name" id="username" />
        <input type="submit" value="Check">
    </form>





    <script>
      const datas = []
      const handleChage = (e)=>{
       
       
        const userName = document.getElementById("username").value
 
        if(userName===""){
            alert('Fill the Input')
            return
        }

        

          datas.push(userName)

          console.log(datas);
          
         e.preventDefault()

         document.getElementById("datas").reset()

      }


        
       

    </script>
</body>
</html>
